<!DOCTYPE html>
<html>
<head>
<title>My Darling ❤️</title>

<style>
body {
    margin:0;
    background:black;
    color:white;
    text-align:center;
    font-family:sans-serif;
}

#lock {
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

input,button {
    padding:10px;
    font-size:18px;
    margin:5px;
}

#main {
    display:none;
}

#slider img {
    width:300px;
    border-radius:15px;
}

button {
    background:red;
    color:white;
    border:none;
    border-radius:5px;
}
</style>

</head>

<body>

<div id="lock">
    <h2>Enter Password ❤️</h2>
    <input type="password" id="pass">
    <button onclick="openSite()">Open</button>
</div>

<div id="main">

<h1>My Darling Bhavna ❤️</h1>

<p>
Dear WonderWoman ❤️<br><br>
10 Sept 2018 se tu meri life ka best part hai...  
Tu meri smile, meri happiness sab kuch hai 💕  
</p>

<!-- 🎵 MUSIC -->
<audio id="music" loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<button onclick="playMusic()">🎵 Play Music</button>

<h2>Our Memories ❤️</h2>

<div id="slider">
    <img id="slide" src="photo1.jpg">
</div>

<h1>I LOVE YOU ❤️</h1>

</div>

<script>

function openSite(){
    let p = document.getElementById("pass").value;
    if(p==="mydarling"){
        document.getElementById("lock").style.display="none";
        document.getElementById("main").style.display="block";
        startSlide();
    } else {
        alert("Wrong Password");
    }
}

// 🎵 music
function playMusic(){
    document.getElementById("music").play();
}

// 📸 slideshow
let i = 1;

function startSlide(){
    setInterval(()=>{
        i++;
        if(i>8) i=1;
        document.getElementById("slide").src="photo"+i+".jpg";
    },2000);
}

</script>

</body>
</html>
