<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My WonderWoman ❤️</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
color:white;
text-align:center;
overflow-x:hidden;
}

/* LOCK */
#lock{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

input{
padding:10px;
border-radius:10px;
border:none;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:#ff4d6d;
color:white;
margin-top:10px;
}

/* MAIN */
#main{display:none;padding:20px;}

.glow{
font-size:28px;
text-shadow:0 0 10px #ff4d6d;
}

/* SLIDER */
#slider img{
width:260px;
border-radius:20px;
transition:0.5s;
}

/* HEART */
.heart{
position:fixed;
bottom:0;
animation:up 5s linear infinite;
}
@keyframes up{
0%{transform:translateY(0);}
100%{transform:translateY(-100vh);}
}
</style>
</head>

<body>

<!-- PASSWORD -->
<div id="lock">
<h2>Enter Password ❤️</h2>
<input type="password" id="pass">
<button onclick="openSite()">Open</button>
</div>

<!-- MAIN -->
<div id="main">

<h1 class="glow">Batman ❤️ WonderWoman</h1>

<p id="typing"></p>

<!-- MUSIC -->
<audio id="music" loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<button onclick="playMusic()">🎵 Play Music</button>

<!-- PHOTOS -->
<h2>Our Memories 📸</h2>
<div id="slider">
<img id="img" src="photo1.jpg">
</div>

<!-- MESSAGE -->
<p>
10 September 2018 se tu meri life ka sabse special part hai ❤️  
Tu meri WonderWoman hai aur main tera Batman 🖤  
</p>

<h1>I LOVE YOU ❤️</h1>

</div>

<script>

// PASSWORD
function openSite(){
let p=document.getElementById("pass").value;
if(p==="mydarling"){
document.getElementById("lock").style.display="none";
document.getElementById("main").style.display="block";
slide();
hearts();
typing();
}else{
alert("Wrong Password");
}
}

// MUSIC
function playMusic(){
document.getElementById("music").play();
}

// SLIDE
let i=1;
function slide(){
setInterval(()=>{
i++;
if(i>8)i=1;
document.getElementById("img").src="photo"+i+".jpg";
},2000);
}

// HEART
function hearts(){
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.style.left=Math.random()*100+"%";
h.innerHTML="❤️";
document.body.appendChild(h);
setTimeout(()=>h.remove(),5000);
},300);
}

// TYPING
let text="10 September 2018 se jab humne baat start ki thi... tab nahi pata tha tu meri life ban jayegi ❤️ Tu meri happiness hai 💕";
let x=0;
function typing(){
let t=setInterval(()=>{
document.getElementById("typing").innerHTML+=text[x];
x++;
if(x>=text.length) clearInterval(t);
},50);
}

</script>

</body>
</html>
